# ================================================================
#  pkgs-zodium — package build & release workflow
# ================================================================

name: Build packages

on:
  push:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
  schedule:
    - cron: "23 04 * * *"
    - cron: "47 08 * * *"
    - cron: "33 14 * * *"
    - cron: "17 19 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - helium-drm
          - zodium-settings
          - fedora-logos
          - plasma-lookandfeel-fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create output directory
        run: mkdir -p output/${{ matrix.package }}

      - name: Build ${{ matrix.package }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/${{ matrix.package }}:/build/${{ matrix.package }}:ro" \
            -v "${{ github.workspace }}/output/${{ matrix.package }}:/output" \
            fedora:latest \
            bash /build/${{ matrix.package }}/build.sh

      - name: Verify RPM
        run: |
          ls -lh output/${{ matrix.package }}/
          [[ "$(ls output/${{ matrix.package }}/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: rpms-${{ matrix.package }}
          path: output/${{ matrix.package }}/*.rpm
          retention-days: 1

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: rpms-*
          path: all-rpms
          merge-multiple: true

      - name: List all RPMs
        run: |
          echo "All RPMs:"
          ls -lh all-rpms/
          [[ "$(ls all-rpms/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found"; exit 1; }

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "pkgs-rpm" \
            --repo ${{ github.repository }} \
            --yes \
            --cleanup-tag \
            || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "pkgs-rpm" \
            --repo ${{ github.repository }} \
            --title "pkgs-rpm" \
            --latest=false \
            --notes "**built:** \`$(date -u '+%Y-%m-%d %H:%M UTC')\`" \
            all-rpms/*.rpm

  update-repo:
    name: Update DNF repo metadata
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          repository: zodium-project/zodium-project.github.io
          token: ${{ secrets.REPO_PAT }}
          path: website

      - name: Install createrepo
        run: sudo apt-get install -y createrepo-c

      - name: Download all RPMs
        uses: actions/download-artifact@v6
        with:
          pattern: rpms-*
          path: all-rpms
          merge-multiple: true

      - name: Update repodata
        run: |
          REPODIR="website/repo/x86_64"
          mkdir -p "$REPODIR"
          rm -rf "$REPODIR"/*.rpm "$REPODIR"/repodata
          cp all-rpms/*.rpm "$REPODIR/"
          createrepo_c \
            --baseurl "https://github.com/zodium-project/pkgs-zodium/releases/download/pkgs-rpm/" \
            "$REPODIR"

      - name: Commit and push repodata
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "repo: update repodata $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push